name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  editor-web:
    name: editor web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor/flowmux-editor-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/flowmux-editor-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test and rebuild editor assets
        run: |
          npm test
          npm run build
          npm run verify

      - name: Check committed editor assets
        working-directory: .
        run: git diff --exit-code -- editor/flowmux-editor-web/dist

  cargo-test:
    name: cargo test
    runs-on: ubuntu-latest
    env:
      GDK_BACKEND: x11
      GTK_A11Y: none
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev libvte-2.91-gtk4-dev \
            libwebkitgtk-6.0-dev libssl-dev \
            libssh2-1-dev libdbus-1-dev \
            meson ninja-build \
            dbus-x11 xvfb

      - name: Install ThorVG (image viewer backend, all loaders + C API)
        run: sudo ./scripts/install-thorvg.sh

      - name: Run tests
        run: xvfb-run -a dbus-run-session -- cargo test --workspace --locked -- --nocapture
