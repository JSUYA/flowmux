# SPDX-License-Identifier: GPL-3.0-or-later

name: License audit

on:
  pull_request:
    paths:
      - Cargo.lock
      - deny.toml
      - about.toml
      - about.hbs
      - THIRD_PARTY_LICENSES.md
      - scripts/generate-third-party-licenses.sh
      - editor/flowmux-editor-web/package.json
      - editor/flowmux-editor-web/package-lock.json
      - editor/flowmux-editor-web/THIRD_PARTY_NOTICES.md
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-about
        run: cargo install cargo-about --locked --features cli

      - name: Check dependency licenses and sources
        run: cargo deny --locked check licenses sources

      - name: Check third-party license notice
        run: |
          scripts/generate-third-party-licenses.sh
          git diff --exit-code THIRD_PARTY_LICENSES.md

      - name: Check editor dependency notice
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const root = 'editor/flowmux-editor-web';
          const manifest = JSON.parse(fs.readFileSync(`${root}/package.json`, 'utf8'));
          const lock = JSON.parse(fs.readFileSync(`${root}/package-lock.json`, 'utf8'));
          const dependencies = Object.keys(manifest.dependencies ?? {});
          if (dependencies.length !== 1 || dependencies[0] !== 'monaco-editor') {
            throw new Error('Review and document the editor production dependencies');
          }
          const dependency = lock.packages['node_modules/monaco-editor'];
          if (dependency?.license !== 'MIT') {
            throw new Error('The editor dependency license is not approved');
          }
          const notice = fs.readFileSync(`${root}/THIRD_PARTY_NOTICES.md`, 'utf8');
          if (!notice.includes(`Monaco Editor ${dependency.version}`)) {
            throw new Error('The editor dependency notice is out of date');
          }
          const distributed = fs.readFileSync(`${root}/dist/THIRD_PARTY_NOTICES.md`, 'utf8');
          if (distributed !== notice) {
            throw new Error('The distributed editor dependency notice is out of date');
          }
          NODE
