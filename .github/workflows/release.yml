# SPDX-License-Identifier: GPL-3.0-or-later

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev libvte-2.91-gtk4-dev \
            libwebkitgtk-6.0-dev libssl-dev \
            libssh2-1-dev libdbus-1-dev libsecret-1-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: |
          cargo build --release --locked \
            -p flowmux -p flowmux-cli -p flowmux-daemon

      - name: Stage tarball
        run: |
          set -euxo pipefail
          stage_name="flowmux-${{ steps.ver.outputs.version }}-${TARGET_TRIPLE}"
          stage="dist/${stage_name}"
          mkdir -p "$stage"
          cp target/release/flowmux        "$stage/"
          cp target/release/flowmuxctl     "$stage/"
          cp target/release/flowmux-daemon "$stage/"
          cp LICENSE NOTICE README.md      "$stage/"
          if [ -f THIRD_PARTY_LICENSES.md ]; then
            cp THIRD_PARTY_LICENSES.md "$stage/"
          fi
          tar -C dist -czf "dist/${stage_name}.tar.gz" "$stage_name"
          (cd dist && sha256sum "${stage_name}.tar.gz" > "${stage_name}.tar.gz.sha256")

      - name: Build .deb package
        run: |
          set -euxo pipefail
          cargo deb -p flowmux --no-build \
            --output "dist/flowmux_${{ steps.ver.outputs.version }}_amd64.deb"
          (cd dist && sha256sum "flowmux_${{ steps.ver.outputs.version }}_amd64.deb" \
            > "flowmux_${{ steps.ver.outputs.version }}_amd64.deb.sha256")

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowmux-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256
