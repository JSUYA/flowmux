<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; worker-src 'self'; font-src 'self'; img-src data:"
    >
    <title>Flowmux Editor</title>
    <link rel="stylesheet" href="./main.css">
  </head>
  <body>
    <main class="editor-shell" aria-label="Flowmux editor">
      <section id="empty-state" class="empty-state">
        <p>Click a text file in Files to edit it.</p>
      </section>
      <div id="editor" class="editor" aria-label="Text editor"></div>
      <span id="document-state" class="document-state" aria-live="polite" hidden></span>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
